---
- name: Dossier des clés apt
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Clé GPG Docker
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Dépôt Docker
  deb822_repository:
    name: docker
    types: deb
    uris: https://download.docker.com/linux/ubuntu
    suites: "{{ ansible_distribution_release }}"
    components: stable
    architectures: amd64
    signed_by: /etc/apt/keyrings/docker.asc
    state: present
    enabled: true

- name: Installer Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: deploy dans le groupe docker
  user:
    name: deploy
    groups: docker
    append: yes

- name: Docker démarré
  systemd:
    name: docker
    enabled: yes
    state: started
