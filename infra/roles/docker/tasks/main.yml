---
- name: Dossier des clés apt
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Clé GPG Docker
  shell: >
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg |
    gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Permissions clé GPG Docker
  file:
    path: /etc/apt/keyrings/docker.gpg
    mode: '0644'

- name: Dépôt Docker
  copy:
    content: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable\n"
    dest: /etc/apt/sources.list.d/docker.list
    mode: '0644'

- name: Installer Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: deploy dans le groupe docker
  user:
    name: deploy
    groups: docker
    append: yes

- name: Docker démarré
  systemd:
    name: docker
    enabled: yes
    state: started
