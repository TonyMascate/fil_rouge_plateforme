---
- name: Créer les Docker Secrets sur le cluster
  hosts: managers
  become: yes
  run_once: true
  tasks:
    - name: Créer les secrets (idempotent — already exists est ignoré)
      shell: "printf '%s' '{{ item.value }}' | docker secret create {{ item.name }} -"
      loop:
        - { name: "db_user",                     value: "{{ db_user }}" }
        - { name: "db_password",                 value: "{{ db_password }}" }
        - { name: "db_name",                     value: "{{ db_name }}" }
        - { name: "jwt_access_secret",           value: "{{ jwt_access_secret }}" }
        - { name: "jwt_refresh_secret",          value: "{{ jwt_refresh_secret }}" }
        - { name: "aws_access_key_id",           value: "{{ aws_access_key_id }}" }
        - { name: "aws_secret_access_key",       value: "{{ aws_secret_access_key }}" }
        - { name: "cloudfront_key_pair_id",      value: "{{ cloudfront_key_pair_id }}" }
        - { name: "cloudfront_private_key_b64",  value: "{{ cloudfront_private_key_b64 }}" }
      register: secret_result
      changed_when: "'already exists' not in (secret_result.stderr | default(''))"
      failed_when:
        - secret_result.rc != 0
        - "'already exists' not in (secret_result.stderr | default(''))"
      no_log: true
