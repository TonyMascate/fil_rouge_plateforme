networks:
  app-net:
    external: true
    name: mon-app_app-net

volumes:
  db-data:
  redis-data:
  caddy_data:
  prometheus-data:
  grafana-data:
  loki-data:

services:
  # --- 1. ROUTAGE (CADDY) ---
  caddy:
    image: lucaslorentz/caddy-docker-proxy:ci-alpine
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - caddy_data:/data
    networks:
      - app-net
    deploy:
      mode: global
      labels:
        caddy.email: "tonymascate@hotmail.com"
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M

  # --- 2. DONNÉES (ÉPINGLÉES SUR MANAGER) ---
  postgres:
    image: postgres:15-alpine
    secrets:
      - db_user
      - db_password
      - db_name
    environment:
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB_FILE: /run/secrets/db_name
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.type == manager
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  redis:
    image: redis:alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - app-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.type == manager
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 32M

  pgbouncer:
    image: edoburu/pgbouncer
    secrets:
      - db_user
      - db_name
      - source: pgbouncer_userlist
        target: userlist.txt
    environment:
      DB_USER_FILE: /run/secrets/db_user
      DB_NAME_FILE: /run/secrets/db_name
      DB_HOST: postgres
      AUTH_TYPE: plain
      AUTH_FILE: /run/secrets/userlist.txt
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,statement_timeout
    networks:
      - app-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.type == manager
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  # --- 3. APPS ---
  api:
    image: ghcr.io/tonymascate/fil-rouge-api:latest
    secrets:
      - db_user
      - db_password
      - db_name
      - jwt_access_secret
      - jwt_refresh_secret
      - aws_access_key_id
      - aws_secret_access_key
      - cloudfront_key_pair_id
      - cloudfront_private_key_b64
    environment:
      # Non-sensible : en clair
      PORT: "3000"
      DB_HOST: pgbouncer
      DB_PORT: "5432"
      DB_SYNC: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: https://fil-rouge-plateforme.com
      COOKIE_DOMAIN: fil-rouge-plateforme.com
      MAX_STORAGE_PER_USER_BYTES: "524288000"
      AWS_REGION: eu-west-3
      S3_BUCKET_NAME: fil-rouge-bucket-s3
      CLOUDFRONT_DOMAIN: d25t9cadohqpuu.cloudfront.net
      CLOUDFRONT_SIGNED_URL_TTL_SECONDS: "3600"
      # Pointeurs vers les Docker Secrets (lus par loadSecrets() dans main.ts)
      DB_USER_FILE: /run/secrets/db_user
      DB_PASSWORD_FILE: /run/secrets/db_password
      DB_NAME_FILE: /run/secrets/db_name
      JWT_ACCESS_SECRET_FILE: /run/secrets/jwt_access_secret
      JWT_REFRESH_SECRET_FILE: /run/secrets/jwt_refresh_secret
      AWS_ACCESS_KEY_ID_FILE: /run/secrets/aws_access_key_id
      AWS_SECRET_ACCESS_KEY_FILE: /run/secrets/aws_secret_access_key
      CLOUDFRONT_KEY_PAIR_ID_FILE: /run/secrets/cloudfront_key_pair_id
      CLOUDFRONT_PRIVATE_KEY_BASE64_FILE: /run/secrets/cloudfront_private_key_b64
    networks:
      - app-net
    deploy:
      replicas: 4
      update_config:
        order: start-first
      labels:
        caddy: api.fil-rouge-plateforme.com
        caddy.reverse_proxy: "mon-app_api:3000"
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M

  web:
    image: ghcr.io/tonymascate/fil-rouge-web:latest
    secrets:
      - jwt_access_secret
      - jwt_refresh_secret
    environment:
      # NEXT_PUBLIC_* baked au build — inutile au runtime
      # JWT lus par instrumentation.ts au démarrage du serveur Next.js
      JWT_ACCESS_SECRET_FILE: /run/secrets/jwt_access_secret
      JWT_REFRESH_SECRET_FILE: /run/secrets/jwt_refresh_secret
    networks:
      - app-net
    deploy:
      replicas: 2
      update_config:
        order: start-first
      labels:
        caddy: fil-rouge-plateforme.com
        caddy.reverse_proxy: "mon-app_web:3000"
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M

  # --- OBSERVABILITÉ / MONITORING ---
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - prometheus-data:/prometheus
      - /var/www/html/fil_rouge/prometheus.yml:/etc/prometheus/prometheus.yml
    command: ['--config.file=/etc/prometheus/prometheus.yml']
    networks:
      - app-net
    deploy:
      placement:
        constraints: [node.labels.type == manager]
      # Volontairement sans label caddy : Prometheus n'a aucune authentification
      # native, et l'exposer publiait /config, /targets et toute l'API de requêtes
      # (cartographie de l'infra, IP internes, routes de l'API). Grafana l'interroge
      # par le réseau interne (http://prometheus:9090, cf. provisioning/datasources),
      # et l'onglet Explore de Grafana remplace l'interface de Prometheus.
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana-data:/var/lib/grafana
      - /var/www/html/fil_rouge/grafana/provisioning:/etc/grafana/provisioning
      - /var/www/html/fil_rouge/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - app-net
    deploy:
      placement:
        constraints: [node.labels.type == manager]
      labels:
        caddy: monitor.fil-rouge-plateforme.com
        caddy.reverse_proxy: "mon-app_grafana:3000"
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    command:
      - '-port=8080'
      - '-docker_only=true'
      - '-housekeeping_interval=15s'
      - '-disable_metrics=disk,tcp,udp,percpu,sched,process'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - app-net
    deploy:
      mode: global
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 64M

  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/config.yml
    volumes:
      - loki-data:/loki
      - /var/www/html/fil_rouge/loki.yml:/etc/loki/config.yml
    networks:
      - app-net
    deploy:
      placement:
        constraints: [node.labels.type == manager]
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/www/html/fil_rouge/promtail.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - app-net
    deploy:
      mode: global
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

# Secrets créés en dehors du stack par playbook-secrets.yml (Ansible).
# external: true = Docker ne les crée pas, il les référence.
secrets:
  db_user:
    external: true
  db_password:
    external: true
  db_name:
    external: true
  jwt_access_secret:
    external: true
  jwt_refresh_secret:
    external: true
  aws_access_key_id:
    external: true
  aws_secret_access_key:
    external: true
  cloudfront_key_pair_id:
    external: true
  cloudfront_private_key_b64:
    external: true
  pgbouncer_userlist:
    external: true
