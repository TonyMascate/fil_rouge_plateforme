name: API CI/CD
on:
  push:
    branches: ["main"]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "infra/**"
      - "stack.yml"
      - "prometheus.yml"
      - "promtail.yml"
      - "loki.yml"
      - "grafana/**"
      - ".github/workflows/api.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/fil-rouge-api

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - name: Installer les dépendances
        run: bun install
      - name: Compiler le package partagé
        run: bun run --filter '@repo/shared' build
      - name: Lancer les tests unitaires avec couverture
        working-directory: apps/api
        run: bun run test:cov
      - name: Lancer les tests E2E Supertest
        working-directory: apps/api
        run: bun run test:e2e

  test-integration:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - name: Installer les dépendances
        run: bun install
      - name: Compiler le package partagé
        run: bun run --filter '@repo/shared' build
      - name: Lancer les tests d'intégration (testcontainers PostgreSQL)
        working-directory: apps/api
        run: bun run test:integration

  build-push:
    needs: [test, test-integration]
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest

  secrets:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Installer Ansible
        run: pip install ansible
      - name: Configurer la clé SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
      - name: Créer les Docker Secrets via Ansible
        working-directory: infra
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CLOUDFRONT_KEY_PAIR_ID: ${{ secrets.CLOUDFRONT_KEY_PAIR_ID }}
          CLOUDFRONT_PRIVATE_KEY_B64: ${{ secrets.CLOUDFRONT_PRIVATE_KEY_BASE64 }}
        run: |
          ansible-playbook playbook-secrets.yml \
            -e "db_user=$DB_USER" \
            -e "db_password=$DB_PASSWORD" \
            -e "db_name=$DB_NAME" \
            -e "jwt_access_secret=$JWT_ACCESS_SECRET" \
            -e "jwt_refresh_secret=$JWT_REFRESH_SECRET" \
            -e "aws_access_key_id=$AWS_ACCESS_KEY_ID" \
            -e "aws_secret_access_key=$AWS_SECRET_ACCESS_KEY" \
            -e "cloudfront_key_pair_id=$CLOUDFRONT_KEY_PAIR_ID" \
            -e "cloudfront_private_key_b64=$CLOUDFRONT_PRIVATE_KEY_B64"

  deploy:
    needs: secrets
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Copier les fichiers de config sur le serveur
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "stack.yml,prometheus.yml,promtail.yml,loki.yml,grafana/"
          target: /var/www/html/fil_rouge/
      - name: Déployer la stack
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/html/fil_rouge
            docker login ghcr.io -u ${{ github.actor }} --password-stdin <<< "${{ secrets.TOKEN }}"
            docker pull ghcr.io/tonymascate/fil-rouge-api:latest
            docker stack deploy --with-registry-auth -c stack.yml mon-app

            for service in prometheus loki promtail; do
              docker service update --force "mon-app_$service"
            done

            docker image prune -f

  migrate:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Exécuter les migrations TypeORM
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker login ghcr.io -u ${{ github.actor }} --password-stdin <<< "${{ secrets.TOKEN }}"

            # Attendre que postgres soit prêt dans le Swarm
            sleep 20

            # Supprimer un éventuel service de migration précédent
            docker service rm api-migrate 2>/dev/null || true

            # Lancer la migration comme service Swarm one-shot
            docker service create \
              --detach \
              --name api-migrate \
              --restart-condition none \
              --network mon-app_app-net \
              --secret db_user \
              --secret db_password \
              --secret db_name \
              -e DB_HOST=mon-app_postgres \
              -e DB_PORT=5432 \
              -e DB_USER_FILE=/run/secrets/db_user \
              -e DB_PASSWORD_FILE=/run/secrets/db_password \
              -e DB_NAME_FILE=/run/secrets/db_name \
              ghcr.io/tonymascate/fil-rouge-api:latest \
              bun node_modules/.bin/typeorm migration:run -d dist/database/data-source.js

            # Attendre la fin (max 90s)
            for i in $(seq 1 30); do
              STATE=$(docker service ps api-migrate --format "{{.CurrentState}}" 2>/dev/null | head -1)
              echo "Migration state: $STATE"
              if echo "$STATE" | grep -qE "Complete|Failed|Rejected"; then
                break
              fi
              sleep 3
            done

            docker service logs api-migrate 2>&1 || true

            FINAL=$(docker service ps api-migrate --format "{{.CurrentState}}" 2>/dev/null | head -1)
            docker service rm api-migrate || true

            if echo "$FINAL" | grep -qE "Failed|Rejected"; then
              echo "Migration échouée"
              exit 1
            fi
