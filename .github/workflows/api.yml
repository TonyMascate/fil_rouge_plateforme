name: API CI/CD
on:
  push:
    branches: ["main"]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "infra/**"
      - "stack.yml"
      - "prometheus.yml"
      - "promtail.yml"
      - ".github/workflows/api.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/fil-rouge-api

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest

  secrets:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Installer Ansible
        run: pip install ansible
      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
      - name: Créer les Docker Secrets via Ansible
        working-directory: infra
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CLOUDFRONT_KEY_PAIR_ID: ${{ secrets.CLOUDFRONT_KEY_PAIR_ID }}
          CLOUDFRONT_PRIVATE_KEY_B64: ${{ secrets.CLOUDFRONT_PRIVATE_KEY_BASE64 }}
        run: |
          ansible-playbook playbook-secrets.yml \
            -e "db_user=$DB_USER" \
            -e "db_password=$DB_PASSWORD" \
            -e "db_name=$DB_NAME" \
            -e "jwt_access_secret=$JWT_ACCESS_SECRET" \
            -e "jwt_refresh_secret=$JWT_REFRESH_SECRET" \
            -e "aws_access_key_id=$AWS_ACCESS_KEY_ID" \
            -e "aws_secret_access_key=$AWS_SECRET_ACCESS_KEY" \
            -e "cloudfront_key_pair_id=$CLOUDFRONT_KEY_PAIR_ID" \
            -e "cloudfront_private_key_b64=$CLOUDFRONT_PRIVATE_KEY_B64"

  deploy:
    needs: secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copier les fichiers de config sur le serveur
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "stack.yml,prometheus.yml,promtail.yml"
          target: /var/www/html/fil_rouge/
      - name: Déployer la stack
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/html/fil_rouge
            echo "${{ secrets.TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/tonymascate/fil-rouge-api:latest
            docker stack deploy --with-registry-auth -c stack.yml mon-app
            docker image prune -f
