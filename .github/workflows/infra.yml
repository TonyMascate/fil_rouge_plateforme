name: Infrastructure (manuel)
on:
  workflow_dispatch:
    inputs:
      playbook:
        description: "Playbook à exécuter"
        required: true
        type: choice
        options:
          - playbook-provision.yml
          - playbook-swarm.yml
      remote_user:
        description: "Utilisateur SSH (root pour le premier run, deploy ensuite)"
        required: true
        type: choice
        default: deploy
        options:
          - deploy
          - root

jobs:
  run-playbook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Installer Ansible
        run: pip install ansible

      - name: Configurer la clé SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          # Le rôle common a besoin de la clé publique (lookup file)
          ssh-keygen -y -f ~/.ssh/id_deploy > ~/.ssh/id_deploy.pub
          chmod 644 ~/.ssh/id_deploy.pub

      - name: Exécuter ${{ inputs.playbook }}
        working-directory: infra
        run: |
          ansible-playbook ${{ inputs.playbook }} \
            -e "ansible_user=${{ inputs.remote_user }}" \
            --private-key ~/.ssh/id_deploy
