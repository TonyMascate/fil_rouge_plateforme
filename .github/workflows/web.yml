name: WEB CI/CD
on:
  push:
    branches: ["main"]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "stack.yml"
      - "prometheus.yml"
      - "promtail.yml"
      - ".github/workflows/web.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/fil-rouge-web

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - name: Installer les dépendances
        run: bun install
      - name: Compiler le package partagé
        run: bun run --filter '@repo/shared' build
      - name: Lancer les tests Vitest
        working-directory: apps/web
        run: bun run test

  playwright:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - name: Installer les dépendances
        run: bun install
      - name: Compiler le package partagé
        run: bun run --filter '@repo/shared' build
      - name: Installer les navigateurs Playwright
        working-directory: apps/web
        run: bunx playwright install --with-deps chromium
      - name: Lancer les tests E2E Playwright
        working-directory: apps/web
        run: bun run test:e2e
      - name: Uploader le rapport Playwright en cas d'échec
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  build-push:
    needs: [test, playwright]
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_CLOUDFRONT_DOMAIN=${{ secrets.NEXT_PUBLIC_CLOUDFRONT_DOMAIN }}

  secrets:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Installer Ansible
        run: pip install ansible
      - name: Configurer la clé SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
      - name: Créer les Docker Secrets via Ansible (idempotent)
        working-directory: infra
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CLOUDFRONT_KEY_PAIR_ID: ${{ secrets.CLOUDFRONT_KEY_PAIR_ID }}
          CLOUDFRONT_PRIVATE_KEY_B64: ${{ secrets.CLOUDFRONT_PRIVATE_KEY_BASE64 }}
        run: |
          ansible-playbook playbook-secrets.yml \
            -e "db_user=$DB_USER" \
            -e "db_password=$DB_PASSWORD" \
            -e "db_name=$DB_NAME" \
            -e "jwt_access_secret=$JWT_ACCESS_SECRET" \
            -e "jwt_refresh_secret=$JWT_REFRESH_SECRET" \
            -e "aws_access_key_id=$AWS_ACCESS_KEY_ID" \
            -e "aws_secret_access_key=$AWS_SECRET_ACCESS_KEY" \
            -e "cloudfront_key_pair_id=$CLOUDFRONT_KEY_PAIR_ID" \
            -e "cloudfront_private_key_b64=$CLOUDFRONT_PRIVATE_KEY_B64"

  deploy:
    needs: secrets
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Copier les fichiers de config sur le serveur
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "stack.yml,prometheus.yml,promtail.yml"
          target: /var/www/html/fil_rouge/
      - name: Déployer la stack
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/html/fil_rouge
            docker login ghcr.io -u ${{ github.actor }} --password-stdin <<< "${{ secrets.TOKEN }}"
            docker pull ghcr.io/tonymascate/fil-rouge-web:latest
            docker stack deploy --with-registry-auth -c stack.yml mon-app
            docker image prune -f
