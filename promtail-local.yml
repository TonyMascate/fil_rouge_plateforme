server:
  http_listen_port: 9080
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    pipeline_stages:
      - json:
          expressions:
            pino_level: level
      - template:
          source: level
          template: >-
            {{ if eq .pino_level "10" }}trace
            {{ else if eq .pino_level "20" }}debug
            {{ else if eq .pino_level "30" }}info
            {{ else if eq .pino_level "40" }}warn
            {{ else if eq .pino_level "50" }}error
            {{ else if eq .pino_level "60" }}fatal
            {{ else }}unknown{{ end }}
      - labels:
          level:
    relabel_configs:
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: app
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      - source_labels: ['__meta_docker_container_label_com_docker_compose_container_number']
        target_label: replica
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
