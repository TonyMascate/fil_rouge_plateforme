apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus-main
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    version: 1
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s

  - name: Loki
    uid: loki-main
    type: loki
    access: proxy
    url: http://loki:3100
    version: 1
    editable: true
    jsonData:
      maxLines: 5000
      derivedFields:
        - matcherRegex: '"requestId":"([^"]+)"'
          name: RequestId
          url: ""
          urlDisplayLabel: Request ID
