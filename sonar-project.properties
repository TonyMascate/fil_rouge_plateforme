# --- Identité du projet SonarQube Cloud ---
sonar.organization=tonymascate
sonar.projectKey=TonyMascate_fil_rouge_plateforme

# --- Code applicatif analysé ---
sonar.sources=apps/api/src,apps/web,packages/shared/src

# --- Fichiers de test (analysés comme tests, pas comme code applicatif) ---
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.test.tsx,**/*.e2e-spec.ts,apps/web/e2e/**

# --- Exclusions (jamais analysées) ---
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/coverage/**,**/*.config.*

# --- Couverture (rapports lcov générés par les tests) ---
sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info,apps/web/coverage/lcov.info,packages/shared/coverage/lcov.info

# Exclus de la COUVERTURE (toujours analysés pour bugs/smells, mais ne comptent
# pas dans le ratio de couverture). On y met le code déclaratif ou d'infrastructure
# qui n'a pas de logique à tester unitairement :
#   - UI (composants/pages React), déjà exclue historiquement
#   - câblage NestJS (modules), bootstrap (main), migrations
#   - entités TypeORM et DTO (déclarations décorées)
#   - configuration (data-source, secrets), chargement de secrets Docker
#   - client HTTP axios et setup de tests
#   - barrel, schémas Zod et constantes du package partagé
sonar.coverage.exclusions=apps/web/components/**/*.tsx,apps/web/app/**/*.tsx,**/*.module.ts,apps/api/src/main.ts,apps/api/src/migrations/**,**/*.entity.ts,**/dto/**,apps/api/src/database/data-source.ts,apps/api/src/config/**,apps/web/lib/docker-secrets.ts,apps/web/lib/axios.ts,apps/web/vitest.setup.ts,packages/shared/src/index.ts,packages/shared/src/errors.ts,packages/shared/src/schemas/**
